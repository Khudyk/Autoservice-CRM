{% extends "base.html" %}
{% block title %}Видалення виду роботи{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <i class="bi-exclamation-triangle me-1"></i> Підтвердження видалення
            </div>
            <div class="card-body text-center py-4">
                <div class="empty-icon text-warning mb-3">
                    <i class="bi-trash" style="font-size: 3rem;"></i>
                </div>
                <h4 class="mb-2">Видалити вид роботи?</h4>
                <p class="text-muted mb-4">
                    Ви впевнені, що хочете видалити вид роботи<br>
                    <strong>"{{ worktype.name }}"</strong>?
                    <br><span class="text-danger small">Цю дію не можна скасувати.</span>
                </p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2 justify-content-center">
                        <button type="submit" class="btn btn-danger">
                            <i class="bi-trash me-1"></i>Так, видалити
                        </button>
                        <a href="{% url 'worktype_list' %}" class="btn btn-outline-secondary">
                            <i class="bi-x-lg me-1"></i>Скасувати
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
